<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Code-cleaner PRO v6</title>

    <script src="https://unpkg.com/prettier@3.0.0/standalone.js"></script>
    <script src="https://unpkg.com/prettier@3.0.0/plugins/babel.js"></script>
    <script src="https://unpkg.com/prettier@3.0.0/plugins/html.js"></script>

    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-blue: #0a84ff;
            --ios-green: #32d74b;
            --ios-purple: #bf5af2;
            --ios-red: #ff453a;
            --ios-text: #ffffff;
            --ios-gray: #3a3a3c;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            font-family: -apple-system, system-ui, sans-serif;
            padding: 20px 15px 40px 15px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        h1 { font-size: 22px; text-align: center; color: var(--ios-blue); margin-bottom: 20px; }

        .ios-group {
            background: var(--ios-card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 0.5px solid #38383a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        label { display: block; color: #8e8e93; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }

        input[type="text"] {
            width: 100%;
            background: #2c2c2e;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 17px;
            padding: 12px;
            margin-bottom: 12px;
            box-sizing: border-box;
            outline: none;
        }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #38383a;
            border-radius: 8px;
            color: #58a6ff;
            font-family: "SF Mono", Menlo, monospace;
            padding: 12px;
            box-sizing: border-box;
            min-height: 200px;
            margin-bottom: 15px;
            outline: none;
            line-height: 1.4;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active { opacity: 0.7; }
        .btn-blue { background: var(--ios-blue); }
        .btn-green { background: var(--ios-green); }
        .btn-purple { background: var(--ios-purple); }
        .btn-gray { background: var(--ios-gray); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .delete-btn {
            color: var(--ios-red);
            background: none;
            border: none;
            width: 100%;
            padding: 10px;
            font-size: 13px;
            margin-top: 5px;
            font-weight: 500;
        }

        .zoom-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        input[type="range"] { flex: 1; accent-color: var(--ios-blue); }
    </style>
</head>
<body>

    <h1>Clean & Send PRO</h1>

    <div class="ios-group">
        <label>Repository Naam</label>
        <input id="repo" type="text" placeholder="Naam in Working Copy...">
        
        <div class="zoom-row">
            <label style="margin:0">Zoom:</label>
            <input type="range" id="zoom" min="10" max="25" value="14" oninput="updateZoom(this.value)">
            <span id="zoomVal" style="font-size: 13px; width: 35px;">14px</span>
        </div>
        
        <button class="btn btn-blue" onclick="saveSettings()">💾 Instellingen Opslaan</button>
    </div>

    <div id="fileList"></div>

    <button class="btn btn-green" onclick="addFile()">+ Nieuw Bestand</button>

    <div style="margin-top: 30px; border-top: 1px solid #38383a; padding-top: 20px;">
        <button class="btn btn-green" onclick="processAll()">🪄 Clean & Format Alles</button>
        <button class="btn btn-purple" onclick="sendAll()">🚀 Send naar Working Copy</button>
    </div>

    <script>
        // Data laden uit geheugen
        let items = JSON.parse(localStorage.getItem("cc_v6_data")) || [{ id: Date.now(), name: "index.html", content: "" }];
        let currentZoom = localStorage.getItem("cc_zoom") || 14;

        function saveSettings() {
            localStorage.setItem("cc_v6_data", JSON.stringify(items));
            localStorage.setItem("cc_repo_v6", document.getElementById('repo').value);
            localStorage.setItem("cc_zoom", currentZoom);
            alert("✅ Instellingen opgeslagen!");
        }

        function updateZoom(v) {
            currentZoom = v;
            document.getElementById('zoomVal').innerText = v + 'px';
            document.querySelectorAll('textarea').forEach(t => t.style.fontSize = v + 'px');
        }

        function addFile() {
            items.push({ id: Date.now(), name: "", content: "" });
            render();
        }

        function updateItem(id, key, val) {
            const item = items.find(x => x.id === id);
            if(item) item[key] = val;
        }

        function removeItem(id) {
            if(confirm("Bestand verwijderen?")) {
                items = items.filter(x => x.id !== id);
                if(items.length === 0) items.push({ id: Date.now(), name: "index.html", content: "" });
                render();
            }
        }

        async function formatItem(id) {
            const item = items.find(x => x.id === id);
            if(!item.content.trim()) return;

            // Bepaal of het HTML of JS is voor de formatter
            const isHTML = item.name.endsWith('.html') || item.content.trim().startsWith('<');
            const parser = isHTML ? 'html' : 'babel';

            try {
                item.content = await prettier.format(item.content, {
                    parser: parser,
                    plugins: prettierPlugins,
                    singleQuote: true,
                    printWidth: 40, // Breedte geoptimaliseerd voor iPhone
                    tabWidth: 2
                });
                render();
            } catch (err) {
                alert("❌ Formatteer fout: " + err.message);
            }
        }

        function sendItem(id) {
            const repo = document.getElementById('repo').value;
            const item = items.find(x => x.id === id);

            if(!repo) return alert("⚠️ Vul de Repo naam in!");
            if(!item.name) return alert("⚠️ Vul de bestandsnaam in!");

            // Veilige URL maken voor Working Copy
            const baseUrl = "working-copy://x-callback-url/write";
            const url = `${baseUrl}?repo=${encodeURIComponent(repo)}&path=${encodeURIComponent(item.name)}&text=${encodeURIComponent(item.content)}&x-success=http://localhost`;

            // Gebruik een onzichtbare link voor een stabiele sprong naar de app
            const a = document.createElement('a');
            a.href = url;
            a.click();
        }

        async function processAll() {
            for (let item of items) {
                // 1. Clean: Alleen foute iPhone quotes vervangen, enters behouden!
                item.content = item.content.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");
                
                // 2. Format: Direct daarna formatteren
                const isHTML = item.name.endsWith('.html') || item.content.trim().startsWith('<');
                try {
                    item.content = await prettier.format(item.content, {
                        parser: isHTML ? 'html' : 'babel',
                        plugins: prettierPlugins,
                        singleQuote: true,
                        printWidth: 40
                    });
                } catch(e) { console.log("Skip format voor " + item.name); }
            }
            render();
            alert("✨ Alles opgeschoond en geformatteerd!");
        }

        function sendAll() {
            if(items.length > 1) alert("De app verspringt nu een paar keer naar Working Copy...");
            let i = 0;
            const next = () => {
                if (i < items.length) {
                    sendItem(items[i].id);
                    i++;
                    setTimeout(next, 1500); // Wacht even tussen bestanden door
                }
            }
            next();
        }

        function render() {
            const container = document.getElementById("fileList");
            container.innerHTML = "";

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "ios-group";
                div.innerHTML = `
                    <label>Bestandsnaam</label>
                    <input type="text" value="${item.name}" placeholder="bijv. index.html" oninput="updateItem(${item.id}, 'name', this.value)">
                    
                    <label>Code Inhoud</label>
                    <textarea oninput="updateItem(${item.id}, 'content', this.value)" style="font-size: ${currentZoom}px">${item.content}</textarea>
                    
                    <div class="grid">
                        <button class="btn btn-gray" onclick="formatItem(${item.id})">✨ Format</button>
                        <button class="btn btn-purple" onclick="sendItem(${item.id})">🚀 Send</button>
                    </div>
                    <button class="delete-btn" onclick="removeItem(${item.id})">🗑️ Bestand Verwijderen</button>
                `;
                container.appendChild(div);
            });
        }

        // Bij opstarten
        window.onload = () => {
            document.getElementById('repo').value = localStorage.getItem("cc_repo_v6") || "";
            document.getElementById('zoom').value = currentZoom;
            document.getElementById('zoomVal').innerText = currentZoom + 'px';
            render();
        };
    </script>
</body>
</html>
