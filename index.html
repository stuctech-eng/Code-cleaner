<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Code-cleaner PRO v6.2.1</title>
    <script src="https://unpkg.com/prettier@3.0.0/standalone.js"></script>
    <script src="https://unpkg.com/prettier@3.0.0/plugins/babel.js"></script>
    <script src="https://unpkg.com/prettier@3.0.0/plugins/html.js"></script>
    <style>
        :root { --ios-bg: #000; --ios-card: #1c1c1e; --ios-blue: #0a84ff; --ios-green: #32d74b; --ios-purple: #bf5af2; --ios-red: #ff453a; --ios-text: #fff; }
        body { background: var(--ios-bg); color: var(--ios-text); font-family: -apple-system, sans-serif; padding: 20px 15px; margin: 0; }
        h1 { font-size: 20px; text-align: center; color: var(--ios-blue); }
        .ios-group { background: var(--ios-card); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 0.5px solid #38383a; }
        label { display: block; color: #8e8e93; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; background: #2c2c2e; border: none; border-radius: 8px; color: white; padding: 12px; box-sizing: border-box; outline: none; }
        textarea { background: #000; border: 1px solid #38383a; color: #58a6ff; font-family: monospace; min-height: 180px; margin-bottom: 10px; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; color: white; width: 100%; cursor: pointer; }
        .btn-blue { background: var(--ios-blue); }
        .btn-green { background: var(--ios-green); }
        .btn-purple { background: var(--ios-purple); }
        .btn-gray { background: #3a3a3c; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .delete-btn { color: var(--ios-red); background: none; border: none; width: 100%; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Code-cleaner PRO</h1>
    <div class="ios-group">
        <label>Repository Naam</label>
        <input id="repo" type="text" oninput="saveGlobal()" placeholder="Naam...">
        <button class="btn btn-blue" style="margin-top:10px" onclick="saveGlobal()">💾 Forceer Opslaan</button>
    </div>
    <div id="fileList"></div>
    <button class="btn btn-green" onclick="addFile()">+ Nieuw Bestand</button>
    <div style="margin-top:30px; border-top:1px solid #38383a; padding-top:20px;">
        <button class="btn btn-purple" onclick="sendAll()">🚀 Alles naar Working Copy</button>
    </div>
    <script>
        let items = JSON.parse(localStorage.getItem("cc_final_storage")) || [{ id: Date.now(), name: "index.html", content: "" }];

        function saveGlobal() {
            localStorage.setItem("cc_final_storage", JSON.stringify(items));
            localStorage.setItem("cc_repo_final", document.getElementById('repo').value);
        }

        function addFile() {
            items.push({ id: Date.now(), name: "", content: "" });
            render();
            saveGlobal();
        }

        function updateItem(id, key, val) {
            const item = items.find(x => x.id === id);
            if(item) { item[key] = val; saveGlobal(); }
        }

        function removeItem(id) {
            if(confirm("Bestand verwijderen?")) {
                items = items.filter(x => x.id !== id);
                if(items.length === 0) items.push({ id: Date.now(), name: "index.html", content: "" });
                saveGlobal();
                render();
            }
        }

        function cleanItem(id) {
            const item = items.find(x => x.id === id);
            if(item) {
                item.content = item.content.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");
                render();
                saveGlobal();
            }
        }

        async function formatItem(id) {
            const item = items.find(x => x.id === id);
            if(!item || !item.content.trim()) return;
            const isHTML = item.name.endsWith('.html') || item.content.trim().startsWith('<');
            try {
                item.content = await prettier.format(item.content, { parser: isHTML ? 'html' : 'babel', plugins: prettierPlugins, singleQuote: true, printWidth: 40 });
                render();
                saveGlobal();
            } catch (err) { alert("Check syntax!"); }
        }

        function sendItem(id) {
            const repo = document.getElementById('repo').value;
            const item = items.find(x => x.id === id);
            if(!repo || !item.name) return alert("Vul repo in!");
            window.location.href = `working-copy://x-callback-url/write?repo=${encodeURIComponent(repo)}&path=${encodeURIComponent(item.name)}&text=${encodeURIComponent(item.content)}&x-success=http://localhost`;
        }

        function render() {
            const container = document.getElementById("fileList");
            container.innerHTML = "";
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "ios-group";
                div.innerHTML = `
                    <input type="text" value="${item.name}" placeholder="Bestandsnaam..." oninput="updateItem(${item.id}, 'name', this.value)">
                    <textarea oninput="updateItem(${item.id}, 'content', this.value)">${item.content}</textarea>
                    <div class="grid-3">
                        <button class="btn btn-gray" onclick="formatItem(${item.id})">✨ Form</button>
                        <button class="btn btn-blue" onclick="cleanItem(${item.id})">🪄 Clean</button>
                        <button class="btn btn-purple" onclick="sendItem(${item.id})">🚀 Send</button>
                    </div>
                    <button class="delete-btn" onclick="removeItem(${item.id})">🗑️ Verwijder</button>
                `;
                container.appendChild(div);
            });
        }

        window.onload = () => {
            document.getElementById('repo').value = localStorage.getItem("cc_repo_final") || "";
            render();
        };
    </script>
</body>
</html>
