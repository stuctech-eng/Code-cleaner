<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Code-cleaner PRO</title>

<script src="https://unpkg.com/prettier@3.0.0/standalone.js"></script>
<script src="https://unpkg.com/prettier@3.0.0/plugins/babel.js"></script>
<script src="https://unpkg.com/prettier@3.0.0/plugins/html.js"></script>

<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --accent: #58a6ff;
    --success: #238636;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, sans-serif;
    padding: 15px;
    margin: 0;
  }

  .header {
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 15px;
  }

  /* De Zoom beïnvloedt nu alles in de editor */
  .zoom-area { transition: font-size 0.2s; }

  input[type="text"], textarea {
    width: 100%;
    box-sizing: border-box;
    background: #010409;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 16px; /* Voorkomt iOS auto-zoom */
    margin-bottom: 10px;
  }

  .zoom-panel {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
    font-size: 14px;
    background: rgba(255,255,255,0.05);
    padding: 8px;
    border-radius: 8px;
  }

  .zoom-panel input { flex: 1; accent-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    color: white;
    font-size: 15px;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { opacity: 0.8; transform: scale(0.98); }

  .btn-blue { background: var(--accent); }
  .btn-green { background: var(--success); }
  .btn-purple { background: #8957e5; }
  .btn-gray { background: #30363d; font-size: 13px; }

  .file-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .grid-tools {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  textarea {
    font-family: 'SF Mono', monospace;
    min-height: 200px;
  }
</style>
</head>
<body>

<div class="header">
  <h2 style="margin:0 0 15px 0; color:var(--accent); text-align:center;">Code-cleaner PRO</h2>
  <input id="repo" type="text" placeholder="Naam van je Repo in Working Copy">
  
  <div class="zoom-panel">
    <span>Zoom:</span>
    <input type="range" min="10" max="25" value="15" id="zSlider">
    <span id="zVal">15px</span>
  </div>
  
  <button class="btn btn-blue" onclick="saveData()">💾 Instellingen Opslaan</button>
</div>

<div id="list" class="zoom-area"></div>

<button class="btn btn-green" onclick="addFile()">+ Extra Bestand Toevoegen</button>

<div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px;">
  <button class="btn btn-green" onclick="processAll()">🪄 Alles Opschonen</button>
  <button class="btn btn-purple" onclick="sendAll()">🚀 Alles naar Working Copy</button>
</div>

<script>
let items = JSON.parse(localStorage.getItem("cc_v4")) || [];
const slider = document.getElementById('zSlider');
const zVal = document.getElementById('zVal');

// Zoom effect op de textareas
slider.oninput = function() {
  zVal.innerText = this.value + "px";
  document.querySelectorAll('textarea').forEach(t => {
    t.style.fontSize = this.value + "px";
  });
};

function addFile() {
  items.push({ id: Date.now(), name: "", content: "" });
  render();
}

function render() {
  const container = document.getElementById("list");
  container.innerHTML = "";
  
  if (items.length === 0) {
    items.push({ id: Date.now(), name: "index.html", content: "" });
  }

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'file-card';
    card.innerHTML = `
      <input type="text" value="${item.name}" placeholder="bestandsnaam.html" oninput="updateItem(${item.id}, 'name', this.value)">
      <textarea id="t-${item.id}" placeholder="Plak hier de code van Claude..." oninput="updateItem(${item.id}, 'content', this.value)" style="font-size:${slider.value}px">${item.content}</textarea>
      
      <div class="grid-tools">
        <button class="btn btn-gray" onclick="copyItem(${item.id})">📋 Copy</button>
        <button class="btn btn-gray" onclick="formatItem(${item.id})">✨ Format</button>
      </div>
      <button class="btn btn-purple" onclick="sendItem(${item.id})">🚀 Send naar Working Copy</button>
      <div style="text-align:center; margin-top:5px;">
        <span onclick="removeItem(${item.id})" style="color:#f85149; font-size:12px; cursor:pointer;">Bestand Verwijderen</span>
      </div>
    `;
    container.appendChild(card);
  });
}

function updateItem(id, key, val) {
  const item = items.find(x => x.id === id);
  if(item) item[key] = val;
}

function removeItem(id) {
  if(items.length > 1 && confirm("Bestand wissen?")) {
    items = items.filter(x => x.id !== id);
    render();
  }
}

function copyItem(id) {
  const item = items.find(x => x.id === id);
  navigator.clipboard.writeText(item.content);
  alert("Gekopieerd naar klembord!");
}

async function formatItem(id) {
  const item = items.find(x => x.id === id);
  if(!item.content) return;
  const parser = item.content.trim().startsWith('<') ? 'html' : 'babel';
  try {
    item.content = await prettier.format(item.content, { 
      parser, plugins: prettierPlugins, singleQuote: true, printWidth: 40 
    });
    render();
  } catch (e) { alert("Format fout: " + e.message); }
}

function sendItem(id) {
  const repo = document.getElementById('repo').value;
  const item = items.find(x => x.id === id);
  if(!repo || !item.name) return alert("Vul repo naam en bestandsnaam in!");
  
  const url = `working-copy://x-callback-url/write?repo=${encodeURIComponent(repo)}&path=${encodeURIComponent(item.name)}&text=${encodeURIComponent(item.content)}`;
  window.location.href = url;
}

function sendAll() {
  let i = 0;
  const next = () => {
    if (i < items.length) {
      sendItem(items[i].id);
      i++;
      setTimeout(next, 2000);
    }
  };
  next();
}

function processAll() {
  items.forEach(item => {
    item.content = item.content.replace(/[""]/g, '"').replace(/[‘’]/g, "'").trim();
  });
  render();
  alert("Alles opgeschoond!");
}

function saveData() {
  localStorage.setItem("cc_v4", JSON.stringify(items));
  localStorage.setItem("cc_repo_v4", document.getElementById('repo').value);
  alert("Instellingen opgeslagen!");
}

window.onload = () => {
  document.getElementById('repo').value = localStorage.getItem("cc_repo_v4") || "";
  render();
};
</script>
</body>
</html>
