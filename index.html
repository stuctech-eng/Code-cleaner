<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Code-cleaner PRO v6.2.3</title>

    <script src="https://unpkg.com/prettier@3.0.0/standalone.js"></script>
    <script src="https://unpkg.com/prettier@3.0.0/plugins/babel.js"></script>
    <script src="https://unpkg.com/prettier@3.0.0/plugins/html.js"></script>

    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-blue: #0a84ff;
            --ios-green: #32d74b;
            --ios-purple: #bf5af2;
            --ios-red: #ff453a;
            --ios-text: #ffffff;
            --ios-gray: #3a3a3c;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            font-family: -apple-system, system-ui, sans-serif;
            padding: env(safe-area-inset-top) 15px 40px 15px;
            margin: 0;
        }

        .header { text-align: center; padding: 20px 0; }
        .header h1 { margin: 0; font-size: 22px; color: var(--ios-blue); }
        .version { font-size: 10px; color: var(--ios-gray); letter-spacing: 1px; margin-top: 4px; }

        .ios-group {
            background: var(--ios-card);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 20px;
            border: 0.5px solid #38383a;
        }

        label { display: block; color: #8e8e93; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }

        /* Repo Selector Styling */
        .repo-controls { display: flex; gap: 8px; margin-bottom: 12px; }
        
        select, input[type="text"] {
            flex: 1;
            background: #2c2c2e;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            padding: 12px;
            outline: none;
            -webkit-appearance: none;
        }

        .btn-icon {
            width: 45px;
            background: #3a3a3c;
            border-radius: 10px;
            border: none;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #38383a;
            border-radius: 10px;
            color: #58a6ff;
            font-family: "SF Mono", monospace;
            padding: 12px;
            box-sizing: border-box;
            min-height: 200px;
            margin-bottom: 15px;
            outline: none;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-blue { background: var(--ios-blue); }
        .btn-green { background: var(--ios-green); }
        .btn-purple { background: var(--ios-purple); }
        .btn-gray { background: var(--ios-gray); }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 5px; }
        .delete-btn { color: var(--ios-red); background: none; border: none; width: 100%; padding: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Code-cleaner PRO</h1>
        <div class="version">VERSION 6.2.3</div>
    </div>

    <div class="ios-group">
        <label>Kies of voeg Repo toe</label>
        <div class="repo-controls">
            <select id="repoSelect" onchange="selectRepo()">
                <option value="">-- Selecteer Repo --</option>
            </select>
            <button class="btn-icon" onclick="deleteRepo()" style="color: var(--ios-red)">🗑️</button>
        </div>
        
        <div class="repo-controls">
            <input id="newRepo" type="text" placeholder="Nieuwe repo naam...">
            <button class="btn-icon" onclick="addRepo()" style="background: var(--ios-blue)">+</button>
        </div>
    </div>

    <div id="fileList"></div>

    <button class="btn btn-green" onclick="addFile()">+ Nieuw Bestand Toevoegen</button>

    <div style="margin-top: 30px; border-top: 1px solid #38383a; padding-top: 25px;">
        <button class="btn btn-purple" style="height: 60px; font-size: 17px;" onclick="sendAll()">🚀 Alles naar Working Copy</button>
    </div>

    <script>
        let items = JSON.parse(localStorage.getItem("cc_final_storage")) || [{ id: Date.now(), name: "index.html", content: "" }];
        let repos = JSON.parse(localStorage.getItem("cc_repos_list")) || [];
        let currentRepo = localStorage.getItem("cc_repo_selected") || "";

        function addRepo() {
            const val = document.getElementById('newRepo').value.trim();
            if(val && !repos.includes(val)) {
                repos.push(val);
                currentRepo = val;
                document.getElementById('newRepo').value = "";
                saveRepos();
                renderRepos();
            }
        }

        function deleteRepo() {
            const sel = document.getElementById('repoSelect').value;
            if(sel && confirm(`Repo "${sel}" verwijderen uit lijst?`)) {
                repos = repos.filter(r => r !== sel);
                currentRepo = "";
                saveRepos();
                renderRepos();
            }
        }

        function selectRepo() {
            currentRepo = document.getElementById('repoSelect').value;
            localStorage.setItem("cc_repo_selected", currentRepo);
        }

        function saveRepos() {
            localStorage.setItem("cc_repos_list", JSON.stringify(repos));
            localStorage.setItem("cc_repo_selected", currentRepo);
        }

        function renderRepos() {
            const sel = document.getElementById('repoSelect');
            sel.innerHTML = '<option value="">-- Kies een Repo --</option>';
            repos.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                if(r === currentRepo) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        function addFile() {
            items.push({ id: Date.now(), name: "", content: "" });
            render();
            saveGlobal();
        }

        function updateItem(id, key, val) {
            const item = items.find(x => x.id === id);
            if(item) { item[key] = val; saveGlobal(); }
        }

        function removeItem(id) {
            if(confirm("Bestand verwijderen?")) {
                items = items.filter(x => x.id !== id);
                if(items.length === 0) items.push({ id: Date.now(), name: "index.html", content: "" });
                saveGlobal();
                render();
            }
        }

        function saveGlobal() {
            localStorage.setItem("cc_final_storage", JSON.stringify(items));
        }

        function cleanItem(id) {
            const item = items.find(x => x.id === id);
            if(item) {
                item.content = item.content.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");
                render();
                saveGlobal();
            }
        }

        async function formatItem(id) {
            const item = items.find(x => x.id === id);
            if(!item || !item.content.trim()) return;
            const isHTML = item.name.endsWith('.html') || item.content.trim().startsWith('<');
            try {
                item.content = await prettier.format(item.content, {
                    parser: isHTML ? 'html' : 'babel',
                    plugins: prettierPlugins,
                    singleQuote: true,
                    printWidth: 40
                });
                render();
                saveGlobal();
            } catch (err) { alert("Syntax fout!"); }
        }

        function sendItem(id) {
            if(!currentRepo) return alert("⚠️ Kies eerst een Repo!");
            const item = items.find(x => x.id === id);
            if(!item.name) return alert("⚠️ Vul bestandsnaam in!");

            const url = `working-copy://x-callback-url/write?repo=${encodeURIComponent(currentRepo)}&path=${encodeURIComponent(item.name)}&text=${encodeURIComponent(item.content)}&x-success=http://localhost`;
            window.location.href = url;
        }

        function sendAll() {
            let i = 0;
            const next = () => {
                if (i < items.length) {
                    sendItem(items[i].id);
                    i++;
                    setTimeout(next, 2000); 
                }
            }
            next();
        }

        function render() {
            const container = document.getElementById("fileList");
            container.innerHTML = "";
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "ios-group";
                div.innerHTML = `
                    <label>Bestandsnaam</label>
                    <input type="text" value="${item.name}" oninput="updateItem(${item.id}, 'name', this.value)">
                    <label>Code</label>
                    <textarea oninput="updateItem(${item.id}, 'content', this.value)">${item.content}</textarea>
                    <div class="grid-3">
                        <button class="btn btn-gray" onclick="formatItem(${item.id})">✨ Form</button>
                        <button class="btn btn-blue" onclick="cleanItem(${item.id})">🪄 Clean</button>
                        <button class="btn btn-purple" onclick="sendItem(${item.id})">🚀 Send</button>
                    </div>
                    <button class="delete-btn" onclick="removeItem(${item.id})">🗑️ Verwijder</button>
                `;
                container.appendChild(div);
            });
        }

        window.onload = () => {
            renderRepos();
            render();
        };
    </script>
</body>
</html>
