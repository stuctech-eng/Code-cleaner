<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Code-cleaner PRO</title>

<script src="https://unpkg.com/prettier@3.0.0/standalone.js"></script>
<script src="https://unpkg.com/prettier@3.0.0/plugins/babel.js"></script>
<script src="https://unpkg.com/prettier@3.0.0/plugins/html.js"></script>

<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --accent: #58a6ff;
    --success: #238636;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 15px;
    margin: 0;
  }

  .header {
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 15px;
  }

  input[type="text"], textarea {
    width: 100%;
    box-sizing: border-box;
    background: #010409;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 16px;
    margin-bottom: 10px;
  }

  .zoom-panel {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
    font-size: 14px;
  }

  .zoom-panel input { flex: 1; accent-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    color: white;
    font-size: 15px;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .btn-blue { background: var(--accent); }
  .btn-green { background: var(--success); }
  .btn-purple { background: #8957e5; }
  .btn-gray { background: #30363d; font-size: 13px; padding: 10px; }

  .file-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 15px;
    margin-top: 20px;
  }

  .grid-tools {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  textarea {
    font-family: 'SF Mono', 'Menlo', monospace;
    min-height: 180px;
    white-space: pre;
    overflow-x: auto;
  }
</style>
</head>
<body>

<div class="header">
  <h2 style="margin-top:0; color:var(--accent); text-align:center;">Code-cleaner PRO</h2>
  <input id="repo" type="text" placeholder="Working Copy Repo Naam">
  
  <div class="zoom-panel">
    <span>Zoom:</span>
    <input type="range" min="10" max="30" value="14" id="zSlider">
    <span id="zVal" style="min-width:40px">14px</span>
  </div>
  
  <button class="btn btn-blue" onclick="saveData()">💾 Instellingen Opslaan</button>
</div>

<button class="btn btn-green" onclick="addFile()">+ Nieuw Bestand</button>

<div id="list"></div>

<div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
  <button class="btn btn-green" onclick="processAll()">🪄 Clean & Format Alles</button>
  <button class="btn btn-purple" onclick="sendAll()">🚀 Alles naar Working Copy</button>
</div>

<script>
let items = JSON.parse(localStorage.getItem("cc_items") || "[]");
const slider = document.getElementById('zSlider');
const zVal = document.getElementById('zVal');

// De zoom-logica
slider.oninput = function() {
  const px = this.value + "px";
  zVal.innerText = px;
  document.querySelectorAll('textarea').forEach(t => t.style.fontSize = px);
};

function addFile() {
  items.push({ id: Date.now(), name: "", content: "" });
  render();
}

function render() {
  const container = document.getElementById("list");
  container.innerHTML = "";
  
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'file-card';
    card.innerHTML = `
      <input type="text" value="${item.name}" placeholder="index.html" oninput="updateItem(${item.id}, 'name', this.value)">
      <textarea id="t-${item.id}" placeholder="Plak code hier..." oninput="updateItem(${item.id}, 'content', this.value)" style="font-size:${slider.value}px">${item.content}</textarea>
      
      <div class="grid-tools">
        <button class="btn btn-gray" onclick="copyItem(${item.id})">📋 Copy</button>
        <button class="btn btn-gray" onclick="formatItem(${item.id})">✨ Format</button>
      </div>
      <button class="btn btn-purple" onclick="sendItem(${item.id})">🚀 Send naar App</button>
      <button onclick="removeItem(${item.id})" style="background:none; border:none; color:#f85149; width:100%; font-size:12px; margin-top:5px;">Verwijderen</button>
    `;
    container.appendChild(card);
  });
}

function updateItem(id, key, val) {
  const item = items.find(x => x.id === id);
  if(item) item[key] = val;
}

function removeItem(id) {
  if(confirm("Zeker weten?")) {
    items = items.filter(x => x.id !== id);
    render();
  }
}

function copyItem(id) {
  const item = items.find(x => x.id === id);
  navigator.clipboard.writeText(item.content);
  alert("Gekopieerd!");
}

async function formatItem(id) {
  const item = items.find(x => x.id === id);
  const parser = item.content.includes('<') ? 'html' : 'babel';
  try {
    item.content = await prettier.format(item.content, { 
      parser, plugins: prettierPlugins, singleQuote: true, printWidth: 45 
    });
    render();
  } catch (e) { alert("Format fout: " + e.message); }
}

function sendItem(id) {
  const repo = document.getElementById('repo').value;
  const item = items.find(x => x.id === id);
  if(!repo || !item.name) return alert("Repo naam en bestandsnaam verplicht!");
  
  const url = `working-copy://x-callback-url/write?repo=${encodeURIComponent(repo)}&path=${encodeURIComponent(item.name)}&text=${encodeURIComponent(item.content)}`;
  window.location.href = url;
}

function sendAll() {
  let i = 0;
  const next = () => {
    if (i < items.length) {
      sendItem(items[i].id);
      i++;
      setTimeout(next, 2500);
    }
  };
  next();
}

function processAll() {
  items.forEach(item => {
    item.content = item.content.replace(/[""]/g, '"').replace(/[‘’]/g, "'").trim();
  });
  render();
}

function saveData() {
  localStorage.setItem("cc_items", JSON.stringify(items));
  localStorage.setItem("cc_repo", document.getElementById('repo').value);
  alert("Opgeslagen!");
}

window.onload = () => {
  document.getElementById('repo').value = localStorage.getItem("cc_repo") || "";
  render();
};
</script>

</body>
</html>
