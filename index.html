<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Code-cleaner PRO</title>

<script src="https://unpkg.com/prettier@3.0.0/standalone.js"></script>
<script src="https://unpkg.com/prettier@3.0.0/plugins/babel.js"></script>
<script src="https://unpkg.com/prettier@3.0.0/plugins/html.js"></script>

<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --accent: #58a6ff;
    --success: #238636;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, sans-serif;
    padding: 10px;
    margin: 0;
  }

  /* Header & Controls */
  .sticky-top {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  input[type="text"], textarea {
    width: 100%;
    box-sizing: border-box;
    background: #010409;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 16px; /* Essentieel voor iPhone */
    margin-top: 8px;
  }

  .zoom-container {
    display: flex;
    align-items: center;
    background: var(--card);
    padding: 10px;
    border-radius: 8px;
    margin: 10px 0;
    gap: 15px;
  }

  .zoom-container input { flex: 1; height: 25px; }

  /* Knoppen styling */
  .btn {
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    color: white;
    font-size: 14px;
    cursor: pointer;
    display: block;
    width: 100%;
    margin-top: 8px;
  }

  .btn-blue { background: var(--accent); }
  .btn-green { background: var(--success); }
  .btn-copy { background: #8b949e; }
  .btn-purple { background: #8957e5; }
  .btn-small { padding: 8px; font-size: 12px; }

  .file-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 15px;
    margin-top: 15px;
  }

  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="sticky-top">
  <h2>Code-cleaner PRO</h2>
  <input id="repo" type="text" placeholder="Working Copy Repo Naam">
  
  <div class="zoom-container">
    <span>Zoom:</span>
    <input type="range" min="10" max="30" value="14" id="zoomSlider">
    <b id="zoomLabel">14px</b>
  </div>

  <button class="btn btn-blue" onclick="saveSettings()">💾 Opslaan & Vernieuwen</button>
</div>

<div id="filesContainer"></div>

<button class="btn btn-green" onclick="addFile()">+ Nieuw Bestand Toevoegen</button>

<div style="margin-top: 20px;">
  <button class="btn btn-green" onclick="processAll()">🪄 Alles Cleanen & Formatteren</button>
  <button class="btn btn-purple" onclick="sendAll()">🚀 Alles naar Working Copy</button>
</div>

<script>
let files = JSON.parse(localStorage.getItem("files_v4") || "[]");
const slider = document.getElementById('zoomSlider');
const zoomLabel = document.getElementById('zoomLabel');

// Zoom functie die echt werkt op alle textareas
slider.addEventListener('input', (e) => {
  const size = e.target.value + "px";
  zoomLabel.innerText = size;
  document.querySelectorAll('textarea').forEach(el => {
    el.style.fontSize = size;
  });
});

function addFile() {
  files.push({ id: Date.now(), name: "", content: "" });
  render();
}

function render() {
  const container = document.getElementById("filesContainer");
  container.innerHTML = "";
  
  files.forEach(f => {
    const card = document.createElement('div');
    card.className = 'file-card';
    card.innerHTML = `
      <input type="text" value="${f.name}" placeholder="bestand.html" onchange="updateFile(${f.id}, 'name', this.value)">
      <textarea id="txt-${f.id}" placeholder="Plak code hier..." onchange="updateFile(${f.id}, 'content', this.value)">${f.content}</textarea>
      
      <div class="action-grid">
        <button class="btn btn-copy" onclick="copyToClipboard(${f.id})">📋 Copy</button>
        <button class="btn btn-blue" onclick="formatSingle(${f.id})">Format</button>
        <button class="btn btn-purple" style="grid-column: span 2;" onclick="sendSingle(${f.id})">Stuur naar Working Copy</button>
      </div>
      <button class="btn btn-small" style="background:transparent; color:#f85149;" onclick="removeFile(${f.id})">Verwijder bestand</button>
    `;
    container.appendChild(card);
  });
  // Reset font-size na render
  document.querySelectorAll('textarea').forEach(el => el.style.fontSize = slider.value + "px");
}

function updateFile(id, key, val) {
  const f = files.find(x => x.id === id);
  if(f) f[key] = val;
}

function removeFile(id) {
  if(confirm("Bestand wissen?")) {
    files = files.filter(x => x.id !== id);
    render();
  }
}

async function formatSingle(id) {
  const f = files.find(x => x.id === id);
  const parser = f.content.includes('<') ? 'html' : 'babel';
  try {
    f.content = await prettier.format(f.content, { 
      parser, plugins: prettierPlugins, singleQuote: true, printWidth: 50 
    });
    render();
  } catch (e) { alert("Fout: " + e.message); }
}

function copyToClipboard(id) {
  const f = files.find(x => x.id === id);
  navigator.clipboard.writeText(f.content).then(() => alert("Gekopieerd!"));
}

function sendSingle(id) {
  const repo = document.getElementById('repo').value;
  const f = files.find(x => x.id === id);
  if(!repo || !f.name) return alert("Repo of naam ontbreekt");
  
  const url = `working-copy://x-callback-url/write?repo=${encodeURIComponent(repo)}&path=${encodeURIComponent(f.name)}&text=${encodeURIComponent(f.content)}`;
  window.location.href = url;
}

function sendAll() {
  let i = 0;
  const next = () => {
    if (i < files.length) {
      sendSingle(files[i].id);
      i++;
      setTimeout(next, 2500);
    }
  };
  next();
}

function processAll() {
  files.forEach(f => {
    f.content = f.content.replace(/[""]/g, '"').replace(/[‘’]/g, "'").trim();
  });
  render();
}

function saveSettings() {
  localStorage.setItem("files_v4", JSON.stringify(files));
  localStorage.setItem("repo_v4", document.getElementById('repo').value);
  location.reload(); // Harde verversing om alles schoon te maken
}

window.onload = () => {
  document.getElementById('repo').value = localStorage.getItem("repo_v4") || "";
  render();
};
</script>
</body>
</html>
