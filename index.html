<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Code-cleaner PRO</title>

<script src="https://unpkg.com/prettier@3.0.0/standalone.js"></script>
<script src="https://unpkg.com/prettier@3.0.0/plugins/babel.js"></script>
<script src="https://unpkg.com/prettier@3.0.0/plugins/html.js"></script>

<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --accent: #58a6ff;
    --success: #238636;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, sans-serif;
    padding: 10px;
    margin: 0;
  }

  h2 { font-size: 1.2rem; color: var(--accent); text-align: center; margin: 15px 0; }

  .controls {
    background: var(--card);
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 15px;
  }

  input[type="text"], textarea {
    width: 100%;
    box-sizing: border-box;
    background: #010409;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 16px; /* Voorkomt iOS zoom */
    margin-bottom: 10px;
  }

  textarea { font-family: monospace; min-height: 200px; }

  .zoom-box { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.8rem; }

  .file-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 15px;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  button {
    padding: 12px;
    border-radius: 6px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    color: white;
    font-size: 0.85rem;
  }

  .btn-blue { background: var(--accent); }
  .btn-green { background: var(--success); }
  .btn-gray { background: #30363d; }
  .btn-purple { background: #8957e5; grid-column: span 2; }
  .btn-full { width: 100%; margin-bottom: 10px; padding: 15px; }

  hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
</style>
</head>

<body>

<h2>Code-cleaner PRO</h2>

<div class="controls">
  <input id="repo" type="text" placeholder="Working Copy Repo Naam">
  <div class="zoom-box">
    <span>Zoom:</span>
    <input type="range" id="z" min="10" max="25" value="13" oninput="updateZoom(this.value)">
    <span id="zv">13px</span>
  </div>
  <button class="btn-blue btn-full" onclick="saveSettings()">💾 Instellingen Opslaan</button>
</div>

<div id="files"></div>

<button class="btn-green btn-full" onclick="addFile()">+ Nieuw Bestand</button>

<hr>

<button class="btn-green btn-full" onclick="processAll()">🪄 Clean & Format Alles</button>
<button class="btn-purple btn-full" onclick="sendAll()">🚀 Alles naar Working Copy</button>

<script>
let files = JSON.parse(localStorage.getItem("cleaner_files") || "[]");
let fontSize = 13;

function updateZoom(v) {
  fontSize = v;
  document.getElementById('zv').innerText = v + 'px';
  document.querySelectorAll('textarea').forEach(t => t.style.fontSize = v + 'px');
}

function addFile() {
  files.push({ id: Date.now(), name: "", content: "" });
  render();
}

function render() {
  const container = document.getElementById("files");
  container.innerHTML = "";
  files.forEach(f => {
    const d = document.createElement('div');
    d.className = 'file-card';
    d.innerHTML = `
      <input type="text" value="${f.name}" onchange="updateF(${f.id}, 'name', this.value)" placeholder="index.html">
      <textarea style="font-size:${fontSize}px" onchange="updateF(${f.id}, 'content', this.value)" placeholder="Plak code van Claude...">${f.content}</textarea>
      <div class="grid">
        <button class="btn-gray" onclick="clean(${f.id})">Clean</button>
        <button class="btn-gray" onclick="format(${f.id})">Format</button>
        <button class="btn-gray" onclick="copyToClipboard(${f.id})">Copy</button>
        <button class="btn-purple" onclick="send(${f.id})">Send naar Working Copy</button>
      </div>
    `;
    container.appendChild(d);
  });
}

function updateF(id, key, val) {
  const f = files.find(x => x.id === id);
  if(f) f[key] = val;
}

function sanitize(t) {
  return t.replace(/[""]/g, '"').replace(/[‘’]/g, "'")
          .replace(/[\u200B-\u200D\uFEFF]/g, '')
          .replace(/```[\s\S]*?```/g, m => m.replace(/```/g, ''))
          .replace(/\t/g, '  ').trim();
}

async function format(id) {
  const f = files.find(x => x.id === id);
  const parser = f.content.trim().startsWith("<") ? "html" : "babel";
  try {
    f.content = await prettier.format(f.content, { 
      parser, plugins: prettierPlugins, 
      singleQuote: true, printWidth: 45 
    });
    render();
  } catch (e) { alert("Fout: " + e.message); }
}

function clean(id) {
  const f = files.find(x => x.id === id);
  f.content = sanitize(f.content);
  render();
}

function copyToClipboard(id) {
  const f = files.find(x => x.id === id);
  navigator.clipboard.writeText(f.content);
  alert("Gekopieerd naar klembord!");
}

function send(id) {
  const r = document.getElementById("repo").value;
  const f = files.find(x => x.id === id);
  if(!r || !f.name) return alert("Vul repo en naam in!");
  const url = `working-copy://x-callback-url/write?repo=${encodeURIComponent(r)}&path=${encodeURIComponent(f.name)}&text=${encodeURIComponent(f.content)}`;
  window.location.href = url;
}

function sendAll() {
  let i = 0;
  const next = () => {
    if (i < files.length) { send(files[i++].id); setTimeout(next, 2000); }
  };
  next();
}

function processAll() {
  files.forEach(f => { f.content = sanitize(f.content); });
  render();
}

function saveSettings() {
  localStorage.setItem("cleaner_files", JSON.stringify(files));
  localStorage.setItem("cleaner_repo", document.getElementById("repo").value);
  alert("Opgeslagen!");
}

window.onload = () => {
  document.getElementById("repo").value = localStorage.getItem("cleaner_repo") || "";
  render();
};
</script>
</body>
</html>
